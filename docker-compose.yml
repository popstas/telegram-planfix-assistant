services:
  telegram-planfix-assistant:
    build:
      context: .
      dockerfile: Dockerfile
    image: telegram-planfix-assistant:latest
    container_name: telegram-planfix-assistant
    restart: unless-stopped
    ports:
      - "8085:8085"
    volumes:
      # data/ holds Telethon session, SQLite DB, and data/config.yml.
      # It must exist on the host before `docker compose up` so the
      # bearer token and Telegram credentials are available.
      - ./data:/data
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import urllib.request,sys;
          r=urllib.request.urlopen('http://127.0.0.1:8085/health',timeout=5);
          sys.exit(0 if r.status==200 else 1)"
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 10s
